services:
  - type: web
    name: skillbridge-backend
    runtime: node
    repo: https://github.com/231216-vaibhav/GSSoC-26
    rootDir: NLP
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: skillbridge-frontend
    env: static
    repo: https://github.com/231216-vaibhav/GSSoC-26
    rootDir: front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
